name: Play Store Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # Allows manual trigger for Play Store builds

permissions:
  contents: read

jobs:
  build:
    name: Build Signed App Bundle (AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > app/release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Play Store AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_LICENSE_KEY: ${{ secrets.PLAY_LICENSE_KEY }}
        run: ./gradlew bundlePlaystoreRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: playstore-bundle
          path: app/build/outputs/bundle/playstoreRelease/*.aab
          retention-days: 7
